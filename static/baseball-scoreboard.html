<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baseball Full Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:transparent;overflow:hidden;}
  body{display:flex;align-items:flex-start;justify-content:flex-start;font-family:'Barlow Condensed',sans-serif;}

  .scoreboard{
    display:inline-flex;flex-direction:column;
    border-radius:6px;overflow:hidden;
    box-shadow:0 8px 48px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.07);
    min-width:560px;
    animation:slideUp .5s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Top bar */
  .sb-top{
    background:linear-gradient(90deg,#080c12,#111825);
    display:flex;align-items:center;justify-content:space-between;
    padding:5px 14px;border-bottom:1px solid rgba(255,255,255,.07);
  }
  .sb-brand{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:#e8b84b;letter-spacing:.2em;}
  .sb-inning-info{display:flex;align-items:center;gap:8px;}
  .sb-half-arrow{font-size:.7rem;color:#8090b0;transition:transform .3s;}
  .sb-half-arrow.bot{transform:rotate(180deg);}
  .sb-half-text{font-size:.58rem;color:#8090b0;letter-spacing:.2em;text-transform:uppercase;}
  .sb-inning-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#f0f2f8;letter-spacing:.08em;}

  /* Main table */
  .sb-body{background:rgba(8,10,16,.97);display:flex;flex-direction:column;}

  /* Header row: inning numbers */
  .sb-header{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);}
  .cell-team{width:160px;flex-shrink:0;padding:0 10px;font-size:.6rem;letter-spacing:.2em;color:#505870;text-transform:uppercase;}
  .cell-inn{width:36px;flex-shrink:0;text-align:center;font-size:.62rem;letter-spacing:.1em;color:#505870;padding:5px 0;}
  .cell-divider{width:1px;background:rgba(255,255,255,.06);align-self:stretch;flex-shrink:0;}
  .cell-stat{width:40px;flex-shrink:0;text-align:center;font-size:.62rem;letter-spacing:.12em;color:#505870;padding:5px 0;}

  /* Team rows */
  .sb-row{display:flex;align-items:center;height:44px;border-bottom:1px solid rgba(255,255,255,.03);}
  .sb-row:last-child{border-bottom:none;}
  .row-team-name{width:160px;flex-shrink:0;padding:0 10px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;color:#f0f2f8;display:flex;align-items:center;gap:7px;}
  .row-indicator{width:3px;height:28px;border-radius:2px;flex-shrink:0;}
  .row-inn-cell{width:36px;flex-shrink:0;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.04em;color:#f0f2f8;transition:color .3s;}
  .row-inn-cell.blank{color:rgba(255,255,255,.12);}
  .row-inn-cell.zero{color:rgba(255,255,255,.35);}
  .row-inn-cell.active-inn{color:#e8b84b;text-shadow:0 0 12px rgba(232,184,75,.5);}
  .row-stat{width:40px;flex-shrink:0;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;}
  .row-total{font-size:1.4rem;}
</style>
</head>
<body>
<div class="scoreboard" id="scoreboard">

  <div class="sb-top">
    <span class="sb-brand" id="sc-brand">BASEBALL</span>
    <div class="sb-inning-info">
      <span class="sb-half-arrow" id="sc-arrow">▲</span>
      <span class="sb-half-text"  id="sc-half">TOP</span>
      <span class="sb-inning-num" id="sc-inning">1<sup style="font-size:.55em">ST</sup></span>
    </div>
  </div>

  <div class="sb-body">
    <!-- Header -->
    <div class="sb-header">
      <div class="cell-team"></div>
      <div class="cell-inn">1</div><div class="cell-inn">2</div><div class="cell-inn">3</div>
      <div class="cell-inn">4</div><div class="cell-inn">5</div><div class="cell-inn">6</div>
      <div class="cell-inn">7</div><div class="cell-inn">8</div><div class="cell-inn">9</div>
      <div class="cell-divider"></div>
      <div class="cell-stat" style="color:#e8b84b;">R</div>
      <div class="cell-stat" style="color:#52e88a;">H</div>
      <div class="cell-stat" style="color:#e85252;">E</div>
    </div>

    <!-- Away row -->
    <div class="sb-row" id="row-away">
      <div class="row-team-name" id="sc-away-name">
        <div class="row-indicator" id="sc-away-ind"></div>
        VISITANTE
      </div>
      <!-- 9 inning cells -->
      <div class="row-inn-cell blank" id="sc-away-i1">—</div>
      <div class="row-inn-cell blank" id="sc-away-i2">—</div>
      <div class="row-inn-cell blank" id="sc-away-i3">—</div>
      <div class="row-inn-cell blank" id="sc-away-i4">—</div>
      <div class="row-inn-cell blank" id="sc-away-i5">—</div>
      <div class="row-inn-cell blank" id="sc-away-i6">—</div>
      <div class="row-inn-cell blank" id="sc-away-i7">—</div>
      <div class="row-inn-cell blank" id="sc-away-i8">—</div>
      <div class="row-inn-cell blank" id="sc-away-i9">—</div>
      <div class="cell-divider"></div>
      <div class="row-stat row-total" id="sc-away-r" style="color:#e85252;">0</div>
      <div class="row-stat" id="sc-away-h" style="color:#52e88a;">0</div>
      <div class="row-stat" id="sc-away-e" style="color:#e85252;">0</div>
    </div>

    <!-- Home row -->
    <div class="sb-row" id="row-home">
      <div class="row-team-name" id="sc-home-name">
        <div class="row-indicator" id="sc-home-ind"></div>
        LOCAL
      </div>
      <div class="row-inn-cell blank" id="sc-home-i1">—</div>
      <div class="row-inn-cell blank" id="sc-home-i2">—</div>
      <div class="row-inn-cell blank" id="sc-home-i3">—</div>
      <div class="row-inn-cell blank" id="sc-home-i4">—</div>
      <div class="row-inn-cell blank" id="sc-home-i5">—</div>
      <div class="row-inn-cell blank" id="sc-home-i6">—</div>
      <div class="row-inn-cell blank" id="sc-home-i7">—</div>
      <div class="row-inn-cell blank" id="sc-home-i8">—</div>
      <div class="row-inn-cell blank" id="sc-home-i9">—</div>
      <div class="cell-divider"></div>
      <div class="row-stat row-total" id="sc-home-r" style="color:#4bc8e8;">0</div>
      <div class="row-stat" id="sc-home-h" style="color:#52e88a;">0</div>
      <div class="row-stat" id="sc-home-e" style="color:#4bc8e8;">0</div>
    </div>
  </div>
</div>

<script>
  const SUFFIXES=['','ST','ND','RD','TH','TH','TH','TH','TH','TH'];
  function sfx(n){return(n===11||n===12||n===13)?'TH':(SUFFIXES[n%10]||'TH');}
  const $=id=>document.getElementById(id);

  function applyState(s){
    if(!s)return;

    // Brand + inning
    $('sc-brand').textContent=s.brand||'BASEBALL';
    const n=s.inning||1;
    $('sc-inning').innerHTML=`${n}<sup style="font-size:.55em">${sfx(n)}</sup>`;
    $('sc-half').textContent=s.isTop?'TOP':'BOT';
    const arr=$('sc-arrow');
    arr.textContent=s.isTop?'▲':'▼';
    arr.className='sb-half-arrow'+(s.isTop?'':' bot');

    // Colors
    const ac=s.awayColor||'#e85252', hc=s.homeColor||'#4bc8e8';
    $('sc-away-ind').style.background=ac; $('sc-home-ind').style.background=hc;
    $('sc-away-r').style.color=ac;  $('sc-home-r').style.color=hc;
    $('sc-away-h').style.color=ac;  $('sc-home-h').style.color=hc;
    $('sc-away-e').style.color=ac;  $('sc-home-e').style.color=hc;

    // Names (keep indicator inside)
    $('sc-away-name').innerHTML=`<div class="row-indicator" id="sc-away-ind" style="background:${ac}"></div>${s.awayName||'VISITANTE'}`;
    $('sc-home-name').innerHTML=`<div class="row-indicator" id="sc-home-ind" style="background:${hc}"></div>${s.homeName||'LOCAL'}`;

    // Totals
    $('sc-away-r').textContent=s.awayScore??0;
    $('sc-home-r').textContent=s.homeScore??0;
    $('sc-away-h').textContent=s.awayHits??0;
    $('sc-home-h').textContent=s.homeHits??0;
    $('sc-away-e').textContent=s.awayErrors??0;
    $('sc-home-e').textContent=s.homeErrors??0;

    // Inning cells
    const scores=s.inningScores||[];
    const curInn=Math.min(s.inning,9);
    for(let i=1;i<=9;i++){
      const row=scores[i-1];
      const aVal=row?row[0]:null;
      const hVal=row?row[1]:null;
      const isActive=(i===curInn);

      ['away','home'].forEach((team,ti)=>{
        const val=ti===0?aVal:hVal;
        const cell=$(`sc-${team}-i${i}`);
        if(val===null||val===undefined){
          // Entrada no jugada
          cell.textContent='—';
          cell.className='row-inn-cell blank';
        } else {
          cell.textContent=String(val);
          cell.className='row-inn-cell'+(val===0?' zero':'')+(isActive?' active-inn':'');
        }
      });
    }
  }

  function connect(){
    const ws=new WebSocket(`ws://${location.host}/ws`);
    ws.onopen=()=>{};
    ws.onclose=()=>{setTimeout(connect,3000);};
    ws.onerror=()=>{};
    ws.onmessage=e=>{try{applyState(JSON.parse(e.data));}catch(err){console.error(err);}};
  }
  connect();
</script>
</body>
</html>
